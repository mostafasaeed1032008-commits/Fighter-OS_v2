<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fighter OS</title>
  <meta name="description" content="Personal martial arts encyclopedia and athlete operating system.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     SIDEBAR NAVIGATION
     ══════════════════════════════════════════════════════════ -->
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Fighter OS</div>
      <div class="sub">Athlete System</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section">Core</div>
      <div class="nav-item active" data-page="dashboard">
        <span class="icon">⬡</span> Dashboard
      </div>
      <div class="nav-item" data-page="exercises">
        <span class="icon">◈</span> Exercises
      </div>
      <div class="nav-item" data-page="workout">
        <span class="icon">◉</span> Workout Builder
      </div>

      <div class="nav-section">Analysis</div>
      <div class="nav-item" data-page="muscles">
        <span class="icon">◍</span> Muscle Analysis
      </div>
      <div class="nav-item" data-page="history">
        <span class="icon">◫</span> History
      </div>

      <div class="nav-section">Manage</div>
      <div class="nav-item" data-page="add">
        <span class="icon">⊕</span> Add Exercise
      </div>
    </div>

    <div class="sidebar-footer">
      Fighter OS v1.0<br>
      Data stored locally in your browser.
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       MAIN CONTENT AREA
       ══════════════════════════════════════════════════════ -->
  <div class="main">
    <div class="topbar">
      <!-- Mobile hamburger (hidden on desktop via CSS) -->
      <button class="topbar-hamburger" id="hamburger-btn" aria-label="Open menu">☰</button>
      <div class="topbar-title" id="page-title">DASHBOARD</div>
      <div class="topbar-right">
        <span class="pts-badge" id="total-pts-badge">0 PTS</span>
      </div>
    </div>

    <div class="content" id="content">
      <!-- Pages are rendered here by app.js -->
      <div class="empty" style="padding-top:80px">
        <div class="empty-icon" style="font-size:48px;margin-bottom:16px">⬡</div>
        <div class="empty-text">Loading Fighter OS…</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     EXERCISE DETAIL MODAL
     ══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="ex-modal" role="dialog" aria-modal="true" aria-labelledby="m-name">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
        <div>
          <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px"
            id="m-bank-cat"></div>
          <div style="font-family:var(--font-display);font-size:28px;letter-spacing:1px;line-height:1.1"
            id="m-name"></div>
        </div>
        <button class="modal-close" onclick="UI.closeModal()" aria-label="Close">✕ Close</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap"
        id="m-meta"></div>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     PRESET WORKOUT MODAL
     ══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="preset-modal" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:var(--font-display);font-size:24px;letter-spacing:1px">PRESET WORKOUTS</div>
        <button class="modal-close" onclick="UI.closePresetModal()">✕ Close</button>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">
        Load a preset to replace your current workout.
      </div>
    </div>
    <div class="modal-body" id="preset-modal-body"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     IMAGE LIGHTBOX
     ══════════════════════════════════════════════════════════ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div id="lightbox-inner"></div>
</div>

<!-- ══════════════════════════════════════════════════════════
     TOAST NOTIFICATION
     ══════════════════════════════════════════════════════════ -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <div class="toast-icon success" id="toast-icon">✓</div>
  <span id="toast-msg"></span>
</div>

<!-- ══════════════════════════════════════════════════════════
     SCRIPTS — load order matters
     storage   → no deps
     banks     → no deps
     stats     → no deps
     media     → no deps
     workouts  → Storage, Stats, Banks
     tracker   → Storage, Banks, UI (forward ref OK, called after boot)
     builder   → Stats, Banks, Media, Storage, Workouts
     app       → all of the above
     ui        → App, Builder, Workouts, Media, Storage
     ══════════════════════════════════════════════════════════ -->
<script src="js/storage.js"></script>
<script src="js/banks.js"></script>
<script src="js/stats.js"></script>
<script src="js/media.js"></script>
<script src="js/workouts.js"></script>
<script src="js/tracker.js"></script>
<script src="js/builder.js"></script>
<script src="js/app.js"></script>
<script src="js/ui.js"></script>

<!-- Boot — synchronous, no fetch() needed -->
<script>
  document.addEventListener('DOMContentLoaded', function() { App.boot(); });
</script>

</body>
</html>
